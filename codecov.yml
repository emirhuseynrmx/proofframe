coverage:
  # Keep hosted coverage gates aligned with pyproject.toml and CI.
  precision: 2
  round: down
  range: "85...100"
  status:
    project:
      default:
        target: 85%
        threshold: 1%
    patch:
      default:
        target: 85%

comment:
  layout: "reach,diff,flags,files"
  require_changes: true
